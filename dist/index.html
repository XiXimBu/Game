<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Skybound Kite</title>
    <style>
        html, body { margin: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #game-container {
            width: 100%;
            height: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            box-sizing: border-box;
        }
        #game-container canvas {
            display: block;
            margin: 0 auto;
        }
        #webcam-wrap { display: none; }
        /* Cam trước kiểu gương: lật cả khung (video + canvas overlay) một lần */
        #webcam-wrap.webcam-preview {
            display: block;
            position: fixed;
            right: 12px;
            bottom: 12px;
            width: min(280px, 36vw);
            max-height: min(210px, 28vh);
            aspect-ratio: 4 / 3;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
            z-index: 1000;
            pointer-events: none;
            overflow: hidden;
            background: #0c0c0c;
            transform: scaleX(-1);
            transform-origin: center center;
        }
        #webcam-wrap.webcam-debug-skeleton {
            border-color: rgba(34, 211, 238, 0.75);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.25), 0 6px 24px rgba(0, 0, 0, 0.45);
        }
        #webcam-wrap #webcam {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
        }
        #webcam-overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: contain;
            object-position: center;
            pointer-events: none;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-CRHRrmBi.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="webcam-wrap">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="webcam-overlay" aria-hidden="true"></canvas>
    </div>


</body>
</html>
